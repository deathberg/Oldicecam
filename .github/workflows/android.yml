name: RE Tool & clone CI
on:
  push:
    branches: [ main, master, 'cursor/re-testicecam2-e3a1' ]
  pull_request:
  workflow_dispatch:
jobs:
  build-retool:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1
      - name: Build RE Tool debug APK
        run: gradle --no-daemon --stacktrace :retool:assembleDebug
      - name: Upload RE Tool APK
        uses: actions/upload-artifact@v4
        with:
          name: RE-Tool-debug-apk
          path: retool/build/outputs/apk/debug/*.apk
